<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP Marketing Group | High School Sponsorship Sales</title>
    <style>
        /* Base Styles */
        :root {
            --primary-blue: #002D62; 
            --accent-gold: #FFB81C; 
            --text-dark: #222222;
            --text-light: #555555;
            --bg-light: #F4F7F6;
            --white: #FFFFFF;
        }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            line-height: 1.6;
            scroll-behavior: smooth;
        }
        h1, h2, h3, h4 {
            margin-top: 0;
            line-height: 1.2;
        }
        
        /* Navigation */
        header {
            background-color: var(--primary-blue);
            color: var(--white);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
        }
        header h1 {
            font-size: 1.5rem;
            margin: 0;
            letter-spacing: 1px;
        }
        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        nav a {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }
        nav a:hover {
            color: var(--accent-gold);
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(0,45,98,0.85), rgba(0,45,98,0.85)), url('https://images.unsplash.com/photo-1504450758481-7338eba7524a?ixlib=rb-4.0.3&auto=format&fit=crop&w=1500&q=80') center/cover;
            color: var(--white);
            text-align: center;
            padding: 120px 20px;
        }
        .hero h2 {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 1.25rem;
            max-width: 800px;
            margin: 0 auto 40px auto;
            color: #E0E0E0;
        }
        .cta-btn {
            background-color: var(--accent-gold);
            color: var(--primary-blue);
            padding: 16px 40px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 5px;
            display: inline-block;
            transition: transform 0.2s ease;
        }
        .cta-btn:hover {
            transform: translateY(-3px);
        }

        /* General Section Layout */
        section {
            padding: 80px 5%;
        }
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            color: var(--primary-blue);
            margin-bottom: 15px;
        }
        .section-subtitle {
            text-align: center;
            font-size: 1.1rem;
            color: var(--text-light);
            max-width: 700px;
            margin: 0 auto 50px auto;
        }

        /* Services / Turnkey */
        .services-bg {
            background-color: var(--bg-light);
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }
        .service-box {
            background: var(--white);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border-left: 5px solid var(--primary-blue);
            margin-bottom: 20px;
        }

        /* Pricing / Consulting Packages */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        .price-card {
            background: var(--white);
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            padding: 40px 30px;
            text-align: center;
        }
        .price-card.gold {
            border: 2px solid var(--accent-gold);
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .price {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin: 20px 0;
        }

        /* Case Studies */
        .case-study {
            margin-bottom: 40px;
            padding-bottom: 40px;
            border-bottom: 1px solid #E0E0E0;
        }
        .case-study:last-child {
            border-bottom: none;
        }
        .case-study h3 {
            color: var(--primary-blue);
            font-size: 1.5rem;
        }

        /* Testimonials */
        .testimonials {
            background-color: var(--primary-blue);
            color: var(--white);
        }
        .testimonials .section-title {
            color: var(--white);
        }
        .quote-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        .quote-box {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 8px;
            font-style: italic;
        }
        .quote-author {
            margin-top: 15px;
            font-weight: bold;
            font-style: normal;
            color: var(--accent-gold);
        }

        /* Team */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            max-width: 900px;
            margin: 0 auto;
        }
        .team-member {
            background: var(--bg-light);
            padding: 40px;
            border-radius: 8px;
            text-align: left;
        }
        .team-member h3 {
            color: var(--primary-blue);
            margin-bottom: 5px;
        }

        /* Footer */
        footer {
            background-color: #111;
            color: #888;
            text-align: center;
            padding: 40px 20px;
        }

        /* === MOBILE RESPONSIVENESS FIXES === */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            nav {
                justify-content: center;
            }
            .hero h2 {
                font-size: 2.2rem;
            }
            .hero p {
                font-size: 1rem;
            }
            .grid-2 {
                grid-template-columns: 1fr; /* Stacks columns on small screens */
            }
